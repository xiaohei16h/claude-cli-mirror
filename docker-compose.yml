services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - cache-proxy
    ports:
      - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
      - "${HTTPS_PORT:-443}:${HTTPS_PORT:-443}"
      - "${HTTPS_PORT:-443}:${HTTPS_PORT:-443}/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./install.sh:/srv/install.sh:ro
      - ./version.txt:/srv/version.txt:ro
      - ./data/caddy:/data
      - ./data/config:/config
    environment:
      - MIRROR_DOMAIN=${MIRROR_DOMAIN:-localhost}
      - GCS_BUCKET=${GCS_BUCKET:-claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819}
      - AUTO_HTTPS=${AUTO_HTTPS:-off}
      - HTTP_PORT=${HTTP_PORT:-80}
      - HTTPS_PORT=${HTTPS_PORT:-443}

  cache-proxy:
    image: python:3-alpine
    restart: unless-stopped
    volumes:
      - ./cache-proxy.py:/app/cache-proxy.py:ro
      - ./data/cache:/data/cache
    environment:
      - GCS_BUCKET=${GCS_BUCKET:-claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - MAX_VERSIONS=${MAX_VERSIONS:-3}
      - PYTHONUNBUFFERED=1
    command: python /app/cache-proxy.py
