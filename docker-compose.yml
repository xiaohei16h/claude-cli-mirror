services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
      - "${HTTPS_PORT:-443}:${HTTPS_PORT:-443}"
      - "${HTTPS_PORT:-443}:${HTTPS_PORT:-443}/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./install.sh:/srv/install.sh:ro
      - ./version.txt:/srv/version.txt:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - MIRROR_DOMAIN=${MIRROR_DOMAIN:-localhost}
      - GCS_BUCKET=${GCS_BUCKET:-claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819}
      - AUTO_HTTPS=${AUTO_HTTPS:-off}
      - HTTP_PORT=${HTTP_PORT:-80}
      - HTTPS_PORT=${HTTPS_PORT:-443}

volumes:
  caddy_data:
  caddy_config:
