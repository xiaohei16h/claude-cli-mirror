services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    dns:
      - 26.26.26.53
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./install.sh:/srv/install.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - MIRROR_DOMAIN=${MIRROR_DOMAIN:-localhost}
      - GCS_BUCKET=${GCS_BUCKET:-claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819}
      - AUTO_HTTPS=${AUTO_HTTPS:-off}

volumes:
  caddy_data:
  caddy_config:
